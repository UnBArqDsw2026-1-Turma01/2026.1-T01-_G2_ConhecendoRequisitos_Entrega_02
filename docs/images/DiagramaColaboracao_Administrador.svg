<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 380" font-family="Arial, Helvetica, sans-serif">
  <!-- Background -->
  <rect width="1050" height="380" fill="white" stroke="black" stroke-width="2"/>

  <!-- Title -->
  <rect x="15" y="10" width="340" height="28" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="25" y="29" font-size="13" font-weight="bold">Interação Gerenciamento do Administrador</text>

  <!-- Actor: Administrador -->
  <circle cx="60" cy="190" r="15" fill="none" stroke="black" stroke-width="2"/>
  <line x1="60" y1="205" x2="60" y2="250" stroke="black" stroke-width="2"/>
  <line x1="35" y1="225" x2="85" y2="225" stroke="black" stroke-width="2"/>
  <line x1="60" y1="250" x2="40" y2="280" stroke="black" stroke-width="2"/>
  <line x1="60" y1="250" x2="80" y2="280" stroke="black" stroke-width="2"/>
  <text x="18" y="300" font-size="13" font-weight="bold">Administrador</text>

  <!-- Object: :PainelAdministrativo -->
  <rect x="140" y="200" width="185" height="45" rx="20" ry="20" fill="white" stroke="black" stroke-width="2"/>
  <text x="157" y="228" font-size="13" font-weight="bold" text-decoration="underline">:PainelAdministrativo</text>

  <!-- Object: :Trilha -->
  <rect x="405" y="90" width="110" height="40" rx="18" ry="18" fill="white" stroke="black" stroke-width="2"/>
  <text x="432" y="115" font-size="13" font-weight="bold" text-decoration="underline">:Trilha</text>

  <!-- Object: :Modulo -->
  <rect x="575" y="90" width="110" height="40" rx="18" ry="18" fill="white" stroke="black" stroke-width="2"/>
  <text x="598" y="115" font-size="13" font-weight="bold" text-decoration="underline">:Modulo</text>

  <!-- Object: :Conteudo -->
  <rect x="745" y="90" width="120" height="40" rx="18" ry="18" fill="white" stroke="black" stroke-width="2"/>
  <text x="765" y="115" font-size="13" font-weight="bold" text-decoration="underline">:Conteudo</text>

  <!-- Object: :Quiz -->
  <rect x="925" y="90" width="100" height="40" rx="18" ry="18" fill="white" stroke="black" stroke-width="2"/>
  <text x="953" y="115" font-size="13" font-weight="bold" text-decoration="underline">:Quiz</text>

  <!-- Object: :Estatisticas -->
  <rect x="405" y="200" width="130" height="40" rx="18" ry="18" fill="white" stroke="black" stroke-width="2"/>
  <text x="420" y="225" font-size="13" font-weight="bold" text-decoration="underline">:Estatísticas</text>

  <!-- Object: :Logout -->
  <rect x="405" y="305" width="110" height="40" rx="18" ry="18" fill="white" stroke="black" stroke-width="2"/>
  <text x="432" y="330" font-size="13" font-weight="bold" text-decoration="underline">:Logout</text>

  <!-- Link: Administrador -> :PainelAdministrativo -->
  <line x1="85" y1="220" x2="140" y2="222" stroke="black" stroke-width="1.5"/>
  <polygon points="140,222 128,217 129,228" fill="black"/>
  <text x="80" y="208" font-size="11" font-style="italic">1: acessar_painel()</text>

  <!-- Link: :PainelAdministrativo -> :Trilha -->
  <line x1="280" y1="200" x2="420" y2="130" stroke="black" stroke-width="1.5"/>
  <polygon points="420,130 407,127 410,137" fill="black"/>
  <text x="295" y="148" font-size="11" font-style="italic">1.1: manter_trilha()</text>

  <!-- Link: :Trilha -> :Modulo -->
  <line x1="515" y1="110" x2="575" y2="110" stroke="black" stroke-width="1.5"/>
  <polygon points="575,110 563,105 563,115" fill="black"/>
  <text x="510" y="85" font-size="11" font-style="italic">1.1.1: manter_modulo()</text>

  <!-- Link: :Modulo -> :Conteudo -->
  <line x1="685" y1="110" x2="745" y2="110" stroke="black" stroke-width="1.5"/>
  <polygon points="745,110 733,105 733,115" fill="black"/>
  <text x="673" y="85" font-size="11" font-style="italic">1.1.2: manter_conteudo()</text>

  <!-- Link: :Conteudo -> :Quiz -->
  <line x1="865" y1="110" x2="925" y2="110" stroke="black" stroke-width="1.5"/>
  <polygon points="925,110 913,105 913,115" fill="black"/>
  <text x="862" y="85" font-size="11" font-style="italic">1.1.3: manter_quiz()</text>

  <!-- Link: :PainelAdministrativo -> :Estatisticas -->
  <line x1="325" y1="222" x2="405" y2="220" stroke="black" stroke-width="1.5"/>
  <polygon points="405,220 393,215 393,225" fill="black"/>
  <text x="310" y="212" font-size="11" font-style="italic">1.2: visualizar_estatísticas()</text>

  <!-- Link: :PainelAdministrativo -> :Logout -->
  <line x1="280" y1="245" x2="420" y2="320" stroke="black" stroke-width="1.5"/>
  <polygon points="420,320 407,317 410,327" fill="black"/>
  <text x="280" y="305" font-size="11" font-style="italic">1.3: realizar_logout()</text>
</svg>
