<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 480" font-family="Arial, Helvetica, sans-serif">
  <!-- Background -->
  <rect width="1080" height="480" fill="white" stroke="black" stroke-width="2"/>

  <!-- Title -->
  <rect x="15" y="10" width="310" height="28" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="25" y="29" font-size="13" font-weight="bold">Interação Aprendizado do Estudante</text>

  <!-- Actor: Aluno -->
  <circle cx="60" cy="230" r="15" fill="none" stroke="black" stroke-width="2"/>
  <line x1="60" y1="245" x2="60" y2="290" stroke="black" stroke-width="2"/>
  <line x1="35" y1="265" x2="85" y2="265" stroke="black" stroke-width="2"/>
  <line x1="60" y1="290" x2="40" y2="320" stroke="black" stroke-width="2"/>
  <line x1="60" y1="290" x2="80" y2="320" stroke="black" stroke-width="2"/>
  <text x="45" y="340" font-size="13" font-weight="bold">Aluno</text>

  <!-- ===== LINHA SUPERIOR: Trilha -> Modulo -> Conteudo -> Quiz -> Sistema ===== -->

  <!-- Object: :Trilha -->
  <rect x="170" y="90" width="110" height="40" rx="18" ry="18" fill="white" stroke="black" stroke-width="2"/>
  <text x="197" y="115" font-size="13" font-weight="bold" text-decoration="underline">:Trilha</text>

  <!-- Object: :Modulo -->
  <rect x="350" y="90" width="110" height="40" rx="18" ry="18" fill="white" stroke="black" stroke-width="2"/>
  <text x="373" y="115" font-size="13" font-weight="bold" text-decoration="underline">:Modulo</text>

  <!-- Object: :Conteudo -->
  <rect x="530" y="90" width="120" height="40" rx="18" ry="18" fill="white" stroke="black" stroke-width="2"/>
  <text x="550" y="115" font-size="13" font-weight="bold" text-decoration="underline">:Conteudo</text>

  <!-- Object: :Quiz -->
  <rect x="720" y="90" width="100" height="40" rx="18" ry="18" fill="white" stroke="black" stroke-width="2"/>
  <text x="748" y="115" font-size="13" font-weight="bold" text-decoration="underline">:Quiz</text>

  <!-- Object: :Sistema -->
  <rect x="935" y="90" width="120" height="40" fill="white" stroke="black" stroke-width="2"/>
  <rect x="930" y="85" width="120" height="40" fill="white" stroke="black" stroke-width="2"/>
  <text x="957" y="110" font-size="13" font-weight="bold" text-decoration="underline">:Sistema</text>

  <!-- ===== LINHA DO MEIO: Perfil -> Conta, Dados ===== -->

  <!-- Object: :Perfil -->
  <rect x="170" y="245" width="110" height="40" rx="18" ry="18" fill="white" stroke="black" stroke-width="2"/>
  <text x="201" y="270" font-size="13" font-weight="bold" text-decoration="underline">:Perfil</text>

  <!-- Object: :Conta -->
  <rect x="365" y="205" width="100" height="40" rx="18" ry="18" fill="white" stroke="black" stroke-width="2"/>
  <text x="391" y="230" font-size="13" font-weight="bold" text-decoration="underline">:Conta</text>

  <!-- Object: :Dados -->
  <rect x="365" y="295" width="100" height="40" rx="18" ry="18" fill="white" stroke="black" stroke-width="2"/>
  <text x="391" y="320" font-size="13" font-weight="bold" text-decoration="underline">:Dados</text>

  <!-- Object: :Logout -->
  <rect x="170" y="395" width="110" height="40" rx="18" ry="18" fill="white" stroke="black" stroke-width="2"/>
  <text x="197" y="420" font-size="13" font-weight="bold" text-decoration="underline">:Logout</text>

  <!-- ===== LINKS E MENSAGENS ===== -->

  <!-- Link: Aluno -> :Trilha (1: acessar_trilha) -->
  <line x1="75" y1="235" x2="185" y2="130" stroke="black" stroke-width="1.5"/>
  <polygon points="185,130 172,129 175,139" fill="black"/>
  <text x="45" y="170" font-size="11" font-style="italic">1: acessar_trilha()</text>

  <!-- Link: :Trilha -> :Modulo (1.2: acessar_modulo) -->
  <line x1="280" y1="110" x2="350" y2="110" stroke="black" stroke-width="1.5"/>
  <polygon points="350,110 338,105 338,115" fill="black"/>
  <text x="275" y="85" font-size="11" font-style="italic">1.2: acessar_modulo()</text>

  <!-- Link: :Modulo -> :Conteudo (1.3: acessar_conteudo) -->
  <line x1="460" y1="110" x2="530" y2="110" stroke="black" stroke-width="1.5"/>
  <polygon points="530,110 518,105 518,115" fill="black"/>
  <text x="447" y="85" font-size="11" font-style="italic">1.3: acessar_conteudo()</text>

  <!-- Link: :Conteudo -> :Quiz (1.4: realizar_quiz) -->
  <line x1="650" y1="110" x2="720" y2="110" stroke="black" stroke-width="1.5"/>
  <polygon points="720,110 708,105 708,115" fill="black"/>
  <text x="640" y="85" font-size="11" font-style="italic">1.4: realizar_quiz()</text>

  <!-- Link: :Quiz -> :Sistema (1.5: validar_questao) -->
  <line x1="820" y1="105" x2="930" y2="100" stroke="black" stroke-width="1.5"/>
  <polygon points="930,100 918,95 918,105" fill="black"/>
  <text x="835" y="88" font-size="11" font-style="italic">1.5: validar_questao()</text>

  <!-- Refazer quiz (self-loop on :Quiz) -->
  <path d="M 780,90 C 800,55 830,55 820,90" fill="none" stroke="black" stroke-width="1.5"/>
  <polygon points="820,90 825,77 815,78" fill="black"/>
  <text x="760" y="55" font-size="11" font-style="italic">1.4.1: refazer_quiz()</text>

  <!-- Sair do quiz sem finalizar (Quiz -> back) -->
  <line x1="720" y1="120" x2="650" y2="150" stroke="black" stroke-width="1.5"/>
  <polygon points="650,150 663,147 660,137" fill="black"/>
  <text x="560" y="175" font-size="11" font-style="italic">1.4.2: sair_do_quiz_sem_finalizar()</text>

  <!-- Link: Aluno -> :Perfil (2: visualizar_perfil) -->
  <line x1="85" y1="265" x2="170" y2="265" stroke="black" stroke-width="1.5"/>
  <polygon points="170,265 158,260 158,270" fill="black"/>
  <text x="75" y="260" font-size="11" font-style="italic">2: visualizar_perfil()</text>

  <!-- Link: :Perfil -> :Conta (2.1: deletar_conta) -->
  <line x1="280" y1="255" x2="365" y2="230" stroke="black" stroke-width="1.5"/>
  <polygon points="365,230 352,228 355,238" fill="black"/>
  <text x="280" y="228" font-size="11" font-style="italic">2.1: deletar_conta()</text>

  <!-- Link: :Perfil -> :Dados (2.2: editar_perfil) -->
  <line x1="280" y1="275" x2="365" y2="310" stroke="black" stroke-width="1.5"/>
  <polygon points="365,310 352,307 355,317" fill="black"/>
  <text x="280" y="310" font-size="11" font-style="italic">2.2: editar_perfil()</text>

  <!-- Link: :Dados -> :Sistema (2.3: validar_credencial) -->
  <line x1="465" y1="315" x2="945" y2="125" stroke="black" stroke-width="1.5"/>
  <polygon points="945,125 932,123 934,133" fill="black"/>
  <text x="530" y="310" font-size="11" font-style="italic">2.3: validar_credencial()</text>

  <!-- Link: Aluno -> :Logout (3: realizar_logout) -->
  <line x1="65" y1="320" x2="180" y2="395" stroke="black" stroke-width="1.5"/>
  <polygon points="180,395 167,392 170,402" fill="black"/>
  <text x="40" y="385" font-size="11" font-style="italic">3: realizar_logout()</text>
</svg>
